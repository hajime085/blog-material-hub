<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材ギャラリー | Blog Material Hub</title>
    <meta name="description" content="ブログ・動画・SNS向けの高品質WebP素材を無料配信。カテゴリとタグで欲しい素材を素早く発見できます。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:   #0f1923;
            --navy2:  #1a2740;
            --accent: #e8520a;
            --acc2:   #ff7340;
            --text:   #1c1c1e;
            --muted:  #6b7280;
            --border: #e5e7eb;
            --bg:     #f8f7f4;
            --surface:#ffffff;
            --r:      8px;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        header {
            background: var(--navy);
            position: sticky; top:0; z-index:300;
        }
        .navbar {
            max-width: 1400px; margin:0 auto;
            padding: .85rem 2rem;
            display:flex; justify-content:space-between; align-items:center; gap:1.5rem;
        }
        .logo {
            font-family:'DM Sans', sans-serif;
            font-size:1.2rem; font-weight:600;
            color:#fff; text-decoration:none;
            display:flex; align-items:center; gap:.5rem; white-space:nowrap;
        }
        .logo-dot { color:var(--acc2); }
        .nav-links { display:flex; gap:1.8rem; }
        .nav-links a {
            color:rgba(255,255,255,.7); text-decoration:none;
            font-size:.88rem; font-weight:500;
            transition:color .2s;
        }
        .nav-links a:hover { color:#fff; }
        .menu-toggle { display:none; background:none; border:none; color:#fff; font-size:1.4rem; cursor:pointer; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 52px; z-index:200;
        }
        .filter-inner {
            max-width:1400px; margin:0 auto;
            padding:.9rem 2rem;
            display:flex; flex-wrap:wrap; align-items:center; gap:.8rem;
        }
        .search-wrap { flex:1; min-width:200px; max-width:340px; position:relative; }
        .search-wrap input {
            width:100%; padding:.55rem .9rem .55rem 2.4rem;
            border:1.5px solid var(--border); border-radius:6px;
            font-size:.88rem; font-family:inherit;
            background:#f9fafb; transition:all .2s;
        }
        .search-wrap input:focus { outline:none; border-color:#94a3b8; background:#fff; }
        .search-icon { position:absolute; left:.7rem; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.95rem; pointer-events:none; }

        .filter-group { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
        .filter-sep { width:1px; height:20px; background:var(--border); margin:0 .3rem; }

        .pill {
            padding:.35rem .85rem; border-radius:20px; font-size:.82rem; font-weight:500;
            border:1.5px solid var(--border); background:#fff; cursor:pointer;
            color:var(--muted); transition:all .18s; white-space:nowrap;
        }
        .pill:hover { border-color:#94a3b8; color:var(--text); }
        .pill.active {
            background: var(--navy); border-color:var(--navy);
            color:#fff;
        }
        .pill.sub.active {
            background:var(--accent); border-color:var(--accent); color:#fff;
        }
        .pill.tag-pill.active {
            background:#f0f9ff; border-color:#7dd3fc; color:#0369a1;
        }

        .result-info { margin-left:auto; font-size:.82rem; color:var(--muted); white-space:nowrap; }

        /* ===== MAIN ===== */
        main { max-width:1400px; margin:0 auto; padding:1.5rem 2rem 3rem; }

        /* ===== MASONRY GRID ===== */
        .masonry {
            columns: 4 240px;
            column-gap: 4px;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 4px;
            display: block;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            background: #e5e7eb;
        }
        .masonry-item img {
            display: block;
            width: 100%;
            height: auto;
            transition: transform .4s cubic-bezier(.25,.46,.45,.94);
        }
        .masonry-item:hover img { transform: scale(1.04); }

        /* ホバーオーバーレイ */
        .item-overlay {
            position: absolute; inset:0;
            background: linear-gradient(to top, rgba(10,15,25,.85) 0%, rgba(10,15,25,.2) 60%, transparent 100%);
            opacity:0; transition: opacity .3s ease;
            display:flex; flex-direction:column; justify-content:flex-end; align-items:flex-start;
            padding: .9rem 1rem;
        }
        .masonry-item:hover .item-overlay { opacity:1; }

        .overlay-icon {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:44px; height:44px; border-radius:50%;
            background:rgba(255,255,255,.95); color:var(--navy);
            display:flex; align-items:center; justify-content:center;
            font-size:1.1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,.3);
            transition: transform .25s;
        }
        .masonry-item:hover .overlay-icon { transform:translate(-50%,-50%) scale(1.1); }

        .overlay-title {
            color:#fff; font-size:.78rem; font-weight:600;
            line-height:1.3; max-width:100%;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
            text-shadow: 0 1px 4px rgba(0,0,0,.5);
        }
        .overlay-cats {
            color:rgba(255,255,255,.7); font-size:.7rem; margin-top:.15rem;
        }

        /* ===== EMPTY ===== */
        .empty {
            text-align:center; padding:5rem 2rem; color:var(--muted);
            display:none;
        }
        .empty h2 { font-size:1.3rem; margin-bottom:.5rem; color:var(--text); }

        /* ===== LOAD MORE ===== */
        .load-more-wrap { text-align:center; margin-top:2.5rem; }
        .load-more-btn {
            padding:.75rem 2.5rem; border-radius:6px;
            border:2px solid var(--navy); color:var(--navy);
            background:#fff; font-size:.9rem; font-weight:700;
            cursor:pointer; transition:all .2s; font-family:inherit;
        }
        .load-more-btn:hover { background:var(--navy); color:#fff; }
        .load-more-info { margin-top:.6rem; font-size:.82rem; color:var(--muted); }

        /* ===== LOADING ===== */
        .loading { text-align:center; padding:4rem; color:var(--muted); }
        .spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ===== FOOTER ===== */
        footer { background:var(--navy2); color:rgba(255,255,255,.7); padding:2.5rem 2rem; }
        .footer-inner { max-width:1400px; margin:0 auto; }
        .footer-links { display:flex; gap:2rem; flex-wrap:wrap; margin-bottom:1.5rem; padding-bottom:1.5rem; border-bottom:1px solid rgba(255,255,255,.1); }
        .footer-links a { color:rgba(255,255,255,.65); text-decoration:none; font-size:.85rem; transition:color .2s; }
        .footer-links a:hover { color:#fff; }
        .footer-copy { font-size:.8rem; color:rgba(255,255,255,.4); }

        /* ===== RESPONSIVE ===== */
        @media(max-width:1200px) { .masonry { columns: 3 220px; } }
        @media(max-width:800px)  { .masonry { columns: 3 160px; } }
        @media(max-width:560px)  {
            .masonry { columns: 2 140px; column-gap:3px; }
            .masonry-item { margin-bottom:3px; }
            .menu-toggle { display:block; }
            .nav-links { display:none; position:absolute; top:100%; left:0; right:0; background:var(--navy); flex-direction:column; gap:0; padding:.5rem 0; }
            .nav-links.open { display:flex; }
            .nav-links a { padding:.8rem 2rem; }
            .filter-inner { padding:.8rem 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="navbar">
        <a href="/blog-material-hub/" class="logo">📦 Blog Material<span class="logo-dot">.</span>Hub</a>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navMenu">
            <a href="/blog-material-hub/">ホーム</a>
            <a href="/blog-material-hub/gallery.html">素材ギャラリー</a>
            <a href="/blog-material-hub/faq.html">よくあるご質問</a>
            <a href="/blog-material-hub/contact.html">お問い合わせ</a>
        </nav>
    </div>
</header>

<div class="filter-bar">
    <div class="filter-inner">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="キーワードで検索…">
        </div>

        <div class="filter-sep"></div>

        <!-- 大分類 -->
        <div class="filter-group" id="largeCatGroup">
            <button class="pill active" data-large="">すべて</button>
        </div>

        <!-- 中分類（選択時のみ表示） -->
        <div class="filter-group" id="subCatGroup" style="display:none;"></div>

        <!-- タグ（現在の絞り込み内で登場するもの） -->
        <div class="filter-group" id="tagGroup" style="display:none;"></div>

        <span class="result-info" id="resultInfo"></span>
    </div>
</div>

<main>
    <div id="loadingMsg" class="loading">
        <div class="spinner"></div>
        <p>素材を読み込んでいます…</p>
    </div>
    <div class="masonry" id="masonry"></div>
    <div class="empty" id="empty">
        <h2>🔍 素材が見つかりません</h2>
        <p>別のキーワードやカテゴリで検索してみてください。</p>
    </div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
        <button class="load-more-btn" id="loadMoreBtn">さらに読み込む</button>
        <div class="load-more-info" id="loadMoreInfo"></div>
    </div>
</main>

<footer>
    <div class="footer-inner">
        <div class="footer-links">
            <a href="/blog-material-hub/privacy.html">プライバシーポリシー</a>
            <a href="/blog-material-hub/terms.html">利用規約</a>
            <a href="/blog-material-hub/disclaimer.html">免責事項</a>
            <a href="/blog-material-hub/contact.html">お問い合わせ</a>
        </div>
        <div class="footer-copy">&copy; 2026 Blog Material Hub. All rights reserved.</div>
    </div>
</footer>

<script>
// ===== NAV =====
document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('navMenu').classList.toggle('open');
});

// ===== 状態 =====
const PER_PAGE = 30;
let allMaterials = [];
let catDefs      = {};
let filtered     = [];
let shownCount   = 0;
let activeFilters = { search:'', large:'', sub:'', tags:[] };

// ===== データ読み込み =====
async function loadData() {
    try {
        const res = await fetch('data.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        allMaterials = json.materials || [];
        catDefs = json.metadata?.largeCategoryDefs || {};
        document.getElementById('loadingMsg').style.display = 'none';
        buildFilters();
        applyFilters();
    } catch(e) {
        // localStorage フォールバック
        try {
            const raw = localStorage.getItem('bmh_preview_json');
            if (raw) {
                const json = JSON.parse(raw);
                allMaterials = json.materials || [];
                catDefs = json.metadata?.largeCategoryDefs || {};
                document.getElementById('loadingMsg').style.display = 'none';
                buildFilters();
                applyFilters();
                return;
            }
        } catch(_){}
        document.getElementById('loadingMsg').innerHTML = '⚠️ data.json を読み込めませんでした。<br><small>GitHub Pages にデプロイ後、または python3 -m http.server でご確認ください。</small>';
    }
}

// ===== フィルタ構築 =====
function buildFilters() {
    const group = document.getElementById('largeCatGroup');
    group.innerHTML = '<button class="pill active" data-large="">すべて</button>';
    Object.entries(catDefs).forEach(([key, def]) => {
        const btn = document.createElement('button');
        btn.className = 'pill';
        btn.dataset.large = key;
        btn.textContent = `${def.icon||''} ${def.label}`;
        btn.addEventListener('click', () => selectLarge(key));
        group.appendChild(btn);
    });
    group.querySelector('[data-large=""]').addEventListener('click', () => selectLarge(''));
    refreshTagGroup();
}

function selectLarge(key) {
    activeFilters.large = key;
    activeFilters.sub   = '';
    activeFilters.tags  = [];
    document.querySelectorAll('#largeCatGroup .pill').forEach(b => b.classList.toggle('active', b.dataset.large === key));
    buildSubGroup(key);
    refreshTagGroup();
    applyFilters();
}

function buildSubGroup(largeKey) {
    const group = document.getElementById('subCatGroup');
    group.innerHTML = '';
    if (!largeKey || !catDefs[largeKey]?.subcategories) { group.style.display = 'none'; return; }
    group.style.display = 'flex';
    Object.entries(catDefs[largeKey].subcategories).forEach(([k, v]) => {
        const btn = document.createElement('button');
        btn.className = 'pill sub' + (k === activeFilters.sub ? ' active' : '');
        btn.textContent = v;
        btn.addEventListener('click', () => {
            activeFilters.sub = activeFilters.sub === k ? '' : k;
            activeFilters.tags = [];
            document.querySelectorAll('#subCatGroup .pill').forEach(b => b.classList.toggle('active', b.textContent === v && activeFilters.sub === k));
            refreshTagGroup();
            applyFilters();
        });
        group.appendChild(btn);
    });
}

function refreshTagGroup() {
    const relevant = allMaterials.filter(m => {
        if (activeFilters.large && m.largeCategory !== activeFilters.large) return false;
        if (activeFilters.sub   && m.category      !== activeFilters.sub)   return false;
        return true;
    });
    const tagSet = new Set();
    relevant.forEach(m => (m.tags||[]).forEach(t => tagSet.add(t)));
    const group = document.getElementById('tagGroup');
    group.innerHTML = '';
    if (!tagSet.size) { group.style.display = 'none'; return; }
    group.style.display = 'flex';
    Array.from(tagSet).sort().forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'pill tag-pill' + (activeFilters.tags.includes(tag) ? ' active' : '');
        btn.textContent = tag;
        btn.addEventListener('click', () => {
            if (activeFilters.tags.includes(tag)) activeFilters.tags = activeFilters.tags.filter(t=>t!==tag);
            else activeFilters.tags.push(tag);
            btn.classList.toggle('active', activeFilters.tags.includes(tag));
            applyFilters();
        });
        group.appendChild(btn);
    });
}

// ===== フィルタ適用 =====
function applyFilters() {
    const q = activeFilters.search.toLowerCase();
    filtered = allMaterials.filter(m => {
        if (activeFilters.large && m.largeCategory !== activeFilters.large) return false;
        if (activeFilters.sub   && m.category      !== activeFilters.sub)   return false;
        if (activeFilters.tags.length && !activeFilters.tags.every(t => (m.tags||[]).includes(t))) return false;
        if (q) {
            const hit = (m.title||'').toLowerCase().includes(q)
                      || (m.description||'').toLowerCase().includes(q)
                      || (m.tags||[]).some(t => t.toLowerCase().includes(q));
            if (!hit) return false;
        }
        return true;
    });
    shownCount = 0;
    document.getElementById('masonry').innerHTML = '';
    renderMore();
}

// ===== 描画 =====
function renderMore() {
    const masonry = document.getElementById('masonry');
    const empty   = document.getElementById('empty');
    const wrap    = document.getElementById('loadMoreWrap');

    if (filtered.length === 0) { empty.style.display='block'; wrap.style.display='none'; return; }
    empty.style.display = 'none';

    const slice = filtered.slice(shownCount, shownCount + PER_PAGE);
    slice.forEach(m => masonry.appendChild(createCard(m)));
    shownCount += slice.length;

    // 件数表示
    document.getElementById('resultInfo').textContent = `${filtered.length} 件`;

    if (shownCount < filtered.length) {
        wrap.style.display = 'block';
        document.getElementById('loadMoreInfo').textContent = `残り ${filtered.length - shownCount} 件`;
    } else {
        wrap.style.display = 'none';
    }
}

document.getElementById('loadMoreBtn').addEventListener('click', renderMore);

// ===== カード生成 =====
function createCard(m) {
    const imgPath = `assets/materials/${m.largeCategory}/${m.filename}`;
    const catLabel = getCatLabel(m.largeCategory, m.category);

    const a = document.createElement('a');
    a.className = 'masonry-item';
    a.href = `download.html?id=${m.id}`;

    // 画像（aspect-ratioをランダム変化させてmasonry感を演出）
    const img = document.createElement('img');
    img.src     = imgPath;
    img.alt     = m.title || m.filename;
    img.loading = 'lazy';
    img.onerror = function() {
        // 画像が無い場合のプレースホルダー
        this.parentElement.style.background = '#d1d5db';
        this.style.opacity = '0';
        this.parentElement.style.minHeight = '160px';
    };

    // オーバーレイ
    const overlay = document.createElement('div');
    overlay.className = 'item-overlay';
    overlay.innerHTML = `
        <div class="overlay-icon">🔍</div>
        <div class="overlay-title">${esc(m.title || m.filename)}</div>
        <div class="overlay-cats">${esc(catLabel)}</div>
    `;

    a.appendChild(img);
    a.appendChild(overlay);
    return a;
}

// ===== 検索 =====
document.getElementById('searchInput').addEventListener('input', e => {
    activeFilters.search = e.target.value.trim();
    applyFilters();
});

// ===== ヘルパー =====
function getCatLabel(large, sub) {
    const l = catDefs[large]; if (!l) return large||'';
    const s = l.subcategories?.[sub] || sub;
    return sub ? `${l.label} › ${s}` : l.label;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== 起動 =====
loadData();

// トップページのカテゴリカードから飛んできた場合、フィルタを引き継ぐ
function applyStoredFilter() {
    const large = sessionStorage.getItem('gallery_filter_large');
    if (large) {
        sessionStorage.removeItem('gallery_filter_large');
        // buildFilters() 完了後に選択
        const trySelect = () => {
            const btn = document.querySelector(`#largeCatGroup [data-large="${large}"]`);
            if (btn) selectLarge(large);
        };
        // data.json 読み込み後に実行されるよう少し待つ
        setTimeout(trySelect, 600);
    }
}
applyStoredFilter();
</script>
</body>
</html>
