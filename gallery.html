<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
        <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材ギャラリー | ソザイノ</title>
    <meta name="description" content="ブログ・動画・SNS向けの高品質WebP素材を無料配信。カテゴリとタグで欲しい素材を素早く発見できます。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:   #0f1923;
            --navy2:  #1a2740;
            --accent: #e8520a;
            --acc2:   #ff7340;
            --text:   #1c1c1e;
            --muted:  #6b7280;
            --border: #e5e7eb;
            --bg:     #f8f7f4;
            --surface:#ffffff;
            --gap:    3px;
            --row-h:  255px; /* 1.5倍に拡大 */
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        header { background:var(--navy); position:sticky; top:0; z-index:300; }
        .navbar {
            max-width:1400px; margin:0 auto;
            padding:.85rem 2rem;
            display:flex; justify-content:space-between; align-items:center; gap:1.5rem;
        }
        .logo {
            font-family:'DM Sans',sans-serif;
            font-size:1.2rem; font-weight:600;
            color:#fff; text-decoration:none;
            display:flex; align-items:center; gap:.5rem; white-space:nowrap;
        }
        .logo-dot { color:var(--acc2); }
        .nav-links { display:flex; gap:1.8rem; }
        .nav-links a { color:rgba(255,255,255,.7); text-decoration:none; font-size:.88rem; font-weight:500; transition:color .2s; }
        .nav-links a:hover { color:#fff; }
        .menu-toggle { display:none; background:none; border:none; color:#fff; font-size:1.4rem; cursor:pointer; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            background:var(--surface);
            border-bottom:1px solid var(--border);
            position:sticky; top:52px; z-index:200;
        }

        /* デスクトップ：縦並び2段 */
        .filter-row {
            max-width:1400px; margin:0 auto;
            padding:.65rem 1.5rem;
            display:flex; align-items:center; gap:.6rem;
            overflow-x:auto;
            scrollbar-width:none;
        }
        .filter-row::-webkit-scrollbar { display:none; }

        .filter-row + .filter-row {
            padding-top:0; padding-bottom:.65rem;
            border-top:1px solid #f3f4f6;
        }

        .search-wrap { position:relative; flex-shrink:0; width:220px; }
        .search-wrap input {
            width:100%; padding:.48rem .9rem .48rem 2.2rem;
            border:1.5px solid var(--border); border-radius:20px;
            font-size:.85rem; font-family:inherit;
            background:#f9fafb; transition:all .2s;
        }
        .search-wrap input:focus { outline:none; border-color:#94a3b8; background:#fff; }
        .search-icon { position:absolute; left:.7rem; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.88rem; pointer-events:none; }

        .filter-sep { width:1px; height:18px; background:var(--border); flex-shrink:0; margin:0 .2rem; }

        .pill {
            padding:.32rem .8rem; border-radius:20px; font-size:.82rem; font-weight:500;
            border:1.5px solid var(--border); background:#fff; cursor:pointer;
            color:var(--muted); transition:all .18s; white-space:nowrap; flex-shrink:0;
            display:inline-flex; align-items:center; gap:.35rem;
        }
        .pill-icon { display:flex; align-items:center; opacity:.7; }
        .pill:hover .pill-icon, .pill.active .pill-icon { opacity:1; }
        .pill:hover { border-color:#94a3b8; color:var(--text); }
        .pill.active { background:var(--navy); border-color:var(--navy); color:#fff; }
        .pill.sub.active { background:var(--accent); border-color:var(--accent); color:#fff; }
        .pill.tag-pill.active { background:#f0f9ff; border-color:#7dd3fc; color:#0369a1; }

        .result-info { margin-left:auto; font-size:.8rem; color:var(--muted); white-space:nowrap; flex-shrink:0; }

        /* ===== MAIN ===== */
        main { padding:var(--gap); }

        /* ===== BENTO GRID ===== */
        .bento {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: var(--row-h);
            gap: var(--gap);
        }

        /* サイズバリエーション */
        .bento-item              { grid-column: span 1; grid-row: span 1; }
        .bento-item.size-wide    { grid-column: span 2; grid-row: span 1; }
        .bento-item.size-tall    { grid-column: span 1; grid-row: span 2; }
        .bento-item.size-big     { grid-column: span 2; grid-row: span 2; }

        .bento-item {
            position:relative;
            overflow:hidden;
            cursor:pointer;
            background:#d1d5db;
            border-radius:4px;
            display:block;
            text-decoration:none;
        }
        .bento-item img {
            width:100%; height:100%;
            object-fit:cover; display:block;
            transition: transform .4s cubic-bezier(.25,.46,.45,.94);
        }
        .bento-item:hover img { transform:scale(1.06); }

        /* ホバーオーバーレイ */
        .item-overlay {
            position:absolute; inset:0;
            background:linear-gradient(to top, rgba(10,15,25,.88) 0%, rgba(10,15,25,.15) 55%, transparent 100%);
            opacity:0; transition:opacity .28s;
            display:flex; flex-direction:column; justify-content:flex-end;
            padding:.75rem .8rem;
        }
        .bento-item:hover .item-overlay { opacity:1; }

        .overlay-icon {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%) scale(.85);
            width:40px; height:40px; border-radius:50%;
            background:rgba(255,255,255,.92); color:var(--navy);
            display:flex; align-items:center; justify-content:center;
            font-size:1rem;
            box-shadow:0 4px 16px rgba(0,0,0,.25);
            transition:transform .25s;
            opacity:0;
        }
        .bento-item:hover .overlay-icon {
            opacity:1;
            transform:translate(-50%,-50%) scale(1);
        }
        .overlay-title {
            color:#fff; font-size:.74rem; font-weight:600;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
            text-shadow:0 1px 3px rgba(0,0,0,.6);
        }
        .overlay-cats { color:rgba(255,255,255,.65); font-size:.68rem; margin-top:.1rem; }

        /* big / wide のオーバーレイはもう少し大きく */
        .size-big .overlay-icon,
        .size-wide .overlay-icon { width:52px; height:52px; font-size:1.25rem; }
        .size-big .overlay-title,
        .size-wide .overlay-title { font-size:.85rem; }

        /* ===== EMPTY ===== */
        .empty { text-align:center; padding:5rem 2rem; color:var(--muted); display:none; }
        .empty h2 { font-size:1.3rem; margin-bottom:.5rem; color:var(--text); }

        /* ===== LOAD MORE ===== */
        .load-more-wrap { text-align:center; padding:1.8rem 1rem; }
        .load-more-btn {
            padding:.7rem 2.2rem; border-radius:6px;
            border:2px solid var(--navy); color:var(--navy);
            background:#fff; font-size:.88rem; font-weight:700;
            cursor:pointer; transition:all .2s; font-family:inherit;
        }
        .load-more-btn:hover { background:var(--navy); color:#fff; }
        .load-more-info { margin-top:.5rem; font-size:.8rem; color:var(--muted); }

        /* ===== LOADING ===== */
        .loading { text-align:center; padding:4rem; color:var(--muted); }
        .spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ===== FOOTER ===== */
        footer { background:var(--navy2); color:rgba(255,255,255,.7); padding:2rem 2rem; }
        .footer-inner { max-width:1400px; margin:0 auto; }
        .footer-links { display:flex; gap:2rem; flex-wrap:wrap; margin-bottom:1.2rem; padding-bottom:1.2rem; border-bottom:1px solid rgba(255,255,255,.1); }
        .footer-links a { color:rgba(255,255,255,.65); text-decoration:none; font-size:.85rem; transition:color .2s; }
        .footer-links a:hover { color:#fff; }
        .footer-copy { font-size:.8rem; color:rgba(255,255,255,.4); }

        /* ===== RESPONSIVE ===== */
        @media(max-width:1100px) {
            .bento { grid-template-columns: repeat(3, 1fr); }
            /* 3列では big は 2×2、wide は 2×1 のまま自然に収まる */
        }

        @media(max-width:700px) {
            :root { --row-h: 210px; --gap: 2px; }
            .bento { grid-template-columns: repeat(2, 1fr); }
            /* 2列: big と wide はどちらも横2=全幅になる */
            .bento-item.size-big  { grid-column: span 2; grid-row: span 2; }
            .bento-item.size-wide { grid-column: span 2; grid-row: span 1; }
            /* tall はそのまま縦2 */

            .navbar { padding:.75rem 1rem; }
            .menu-toggle { display:block; }
            .nav-links {
                display:none; position:absolute; top:100%; left:0; right:0;
                background:var(--navy); flex-direction:column; gap:0; padding:.5rem 0;
            }
            .nav-links.open { display:flex; }
            .nav-links a { padding:.75rem 1.5rem; }

            .filter-bar { top:48px; }
            .filter-row { padding:.5rem .75rem; gap:.4rem; }
            .search-wrap { width:160px; }
            .filter-row + .filter-row { padding-top:0; padding-bottom:.5rem; }

            .pill { padding:.28rem .65rem; font-size:.78rem; }

            /* モバイルはフィルター行を非表示（検索＋大分類のみ表示、タグは折りたたむ） */
            #rowSub, #rowTag { display:none !important; }
            #rowSub.has-items, #rowTag.has-items { display:flex !important; }
        }

        @media(max-width:400px) {
            :root { --row-h: 180px; }
        }
    </style>
</head>
<body>

<header>
    <div class="navbar">
        <a href="/" class="logo">ソザイノ<span class="logo-dot">.</span></a>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav class="nav-links" id="navMenu">
            <a href="/">ホーム</a>
            <a href="gallery.html">素材ギャラリー</a>
            <a href="faq.html">よくあるご質問</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
    </div>
</header>

<!-- フィルターバー：各行が横スクロール -->
<div class="filter-bar">
    <!-- 行1：検索 + 大分類 + 件数 -->
    <div class="filter-row" id="rowLarge">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="キーワードで検索…">
        </div>
        <div class="filter-sep"></div>
        <button class="pill active" data-large="" id="pillAll">すべて</button>
        <!-- 大分類ボタンはJS生成 -->
        <span class="result-info" id="resultInfo"></span>
    </div>
    <!-- 行2：中分類（選択時のみ） -->
    <div class="filter-row" id="rowSub" style="display:none;padding-top:0;padding-bottom:.5rem;"></div>
    <!-- 行3：タグ（選択時のみ） -->
    <div class="filter-row" id="rowTag" style="display:none;padding-top:0;padding-bottom:.5rem;"></div>
</div>

<div id="loadingMsg" class="loading">
    <div class="spinner"></div>
    <p>素材を読み込んでいます…</p>
</div>

<main>
    <div class="bento" id="bento"></div>
    <div class="empty" id="empty">
        <h2>🔍 素材が見つかりません</h2>
        <p>別のキーワードやカテゴリで検索してみてください。</p>
    </div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
        <button class="load-more-btn" id="loadMoreBtn">さらに読み込む</button>
        <div class="load-more-info" id="loadMoreInfo"></div>
    </div>
</main>

<footer>
    <div class="footer-inner">
        <div class="footer-links">
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="terms.html">利用規約</a>
            <a href="disclaimer.html">免責事項</a>
            <a href="contact.html">お問い合わせ</a>
        </div>
        <div class="footer-copy">&copy; 2026 Blog Material Hub. All rights reserved.</div>
    </div>
</footer>

<script>
// ===== NAV =====
document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('navMenu').classList.toggle('open');
});

// ===== タイルサイズパターン =====
// 「計算されたランダム感」: 繰り返しで自然なバラつきを演出
// normal=1x1, wide=2x1, tall=1x2, big=2x2
const SIZE_PATTERN = [
    'normal', 'normal', 'wide',
    'normal', 'tall',   'normal',
    'normal', 'wide',   'normal',
    'tall',   'normal', 'normal',
    'big',    'normal', 'normal',
    'wide',   'normal', 'tall',
    'normal', 'normal', 'wide',
    'normal', 'normal', 'tall',
];

function getSizeClass(globalIndex) {
    return SIZE_PATTERN[globalIndex % SIZE_PATTERN.length];
}

// ===== 状態 =====
const PER_PAGE = 30;
let allMaterials  = [];
let catDefs       = {};
let filtered      = [];
let shownCount    = 0;
let globalCardIdx = 0; // 全体での通し番号（サイズパターン計算用）
let activeFilters = { search:'', large:'', sub:'', tags:[] };

// ===== データ読み込み =====
async function loadData() {
    try {
        const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        allMaterials = json.materials || [];
        catDefs = json.metadata?.largeCategoryDefs || {};
    } catch(e) {
        try {
            const raw = localStorage.getItem('bmh_preview_json');
            if (raw) { const j=JSON.parse(raw); allMaterials=j.materials||[]; catDefs=j.metadata?.largeCategoryDefs||{}; }
        } catch(_) {}
    }
    document.getElementById('loadingMsg').style.display = 'none';
    buildFilters();
    applyFilters();
    applyStoredFilter();
}

// ===== フィルタ構築 =====
function buildFilters() {
    const row = document.getElementById('rowLarge');
    // 既存の大分類ボタンを除去（「すべて」とsearch以外）
    row.querySelectorAll('.pill[data-large]').forEach(b => { if(b.id !== 'pillAll') b.remove(); });

    // カテゴリ別SVGアイコン定義
    const CAT_ICONS = {
        nature:      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12"/><path d="M12 12C12 7 7 3 2 3c0 5 4 9 10 9z"/><path d="M12 12c0-5 5-9 10-9-1 5-5 9-10 9z"/></svg>`,
        food:        `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>`,
        backgrounds: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`,
        home:        `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
        person:      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
        blog:        `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
        beauty:      `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`,
        outdoor:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 17 12 3 21 17"/><path d="M3 17h18"/></svg>`,
        character:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/><path d="M12 12v2"/></svg>`,
    };

    Object.entries(catDefs).forEach(([key, def]) => {
        const btn = document.createElement('button');
        btn.className = 'pill';
        btn.dataset.large = key;
        const svgIcon = CAT_ICONS[key] || '';
        btn.innerHTML = svgIcon ? `<span class="pill-icon">${svgIcon}</span>${def.label}` : def.label;
        btn.addEventListener('click', () => selectLarge(key));
        row.querySelector('.result-info').before(btn);
    });
    document.getElementById('pillAll').addEventListener('click', () => selectLarge(''));
    refreshTagRow();
}

function selectLarge(key) {
    activeFilters.large = key;
    activeFilters.sub   = '';
    activeFilters.tags  = [];
    document.querySelectorAll('#rowLarge .pill[data-large]').forEach(b => b.classList.toggle('active', b.dataset.large === key));
    buildSubRow(key);
    refreshTagRow();
    applyFilters();
}

function buildSubRow(largeKey) {
    const row = document.getElementById('rowSub');
    row.innerHTML = '';
    if (!largeKey || !catDefs[largeKey]?.subcategories) { row.style.display='none'; row.classList.remove('has-items'); return; }
    row.style.display = 'flex';
    row.classList.add('has-items');
    Object.entries(catDefs[largeKey].subcategories).forEach(([k, v]) => {
        const btn = document.createElement('button');
        btn.className = 'pill sub' + (k===activeFilters.sub ? ' active' : '');
        btn.textContent = v;
        btn.addEventListener('click', () => {
            activeFilters.sub = activeFilters.sub===k ? '' : k;
            activeFilters.tags = [];
            row.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.textContent===v && activeFilters.sub===k));
            refreshTagRow();
            applyFilters();
        });
        row.appendChild(btn);
    });
}

function refreshTagRow() {
    const row = document.getElementById('rowTag');
    row.innerHTML = '';

    // 「すべて」選択中はタグ非表示
    if (!activeFilters.large) {
        row.style.display = 'none';
        row.classList.remove('has-items');
        return;
    }

    const relevant = allMaterials.filter(m => {
        if (activeFilters.large && m.largeCategory !== activeFilters.large) return false;
        if (activeFilters.sub   && m.category      !== activeFilters.sub)   return false;
        return true;
    });
    const tagSet = new Set();
    relevant.forEach(m => (m.tags||[]).forEach(t => tagSet.add(t)));

    if (!tagSet.size) { row.style.display='none'; row.classList.remove('has-items'); return; }

    const allTags  = Array.from(tagSet).sort();
    const LIMIT    = 12;
    const showAll  = allTags.length <= LIMIT;
    const visibleTags = showAll ? allTags : allTags.slice(0, LIMIT);

    row.style.display = 'flex';
    row.classList.add('has-items');

    const renderTags = (tags) => {
        tags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'pill tag-pill' + (activeFilters.tags.includes(tag) ? ' active' : '');
            btn.textContent = tag;
            btn.addEventListener('click', () => {
                if (activeFilters.tags.includes(tag)) activeFilters.tags = activeFilters.tags.filter(t=>t!==tag);
                else activeFilters.tags.push(tag);
                btn.classList.toggle('active', activeFilters.tags.includes(tag));
                applyFilters();
            });
            row.insertBefore(btn, row.querySelector('.tag-more-btn'));
        });
    };

    // 「もっと見る」ボタン（先に追加しておく）
    if (!showAll) {
        const remaining = allTags.length - LIMIT;
        const moreBtn = document.createElement('button');
        moreBtn.className = 'pill tag-more-btn';
        moreBtn.textContent = `＋${remaining}件 もっと見る`;
        moreBtn.style.cssText = 'border-style:dashed;';
        moreBtn.addEventListener('click', () => {
            moreBtn.remove();
            renderTags(allTags.slice(LIMIT));
        });
        row.appendChild(moreBtn);
    } else {
        // もっと見るなし用のダミー（insertBefore用）
        const dummy = document.createElement('span');
        dummy.className = 'tag-more-btn';
        dummy.style.display = 'none';
        row.appendChild(dummy);
    }

    renderTags(visibleTags);
}

// ===== フィルタ適用 =====
function applyFilters() {
    const q = activeFilters.search.toLowerCase();
    filtered = allMaterials.filter(m => {
        if (activeFilters.large && m.largeCategory !== activeFilters.large) return false;
        if (activeFilters.sub   && m.category      !== activeFilters.sub)   return false;
        if (activeFilters.tags.length && !activeFilters.tags.every(t => (m.tags||[]).includes(t))) return false;
        if (q) {
            const hit = (m.title||'').toLowerCase().includes(q)
                      || (m.description||'').toLowerCase().includes(q)
                      || (m.tags||[]).some(t => t.toLowerCase().includes(q));
            if (!hit) return false;
        }
        return true;
    });
    // 新着順（ID降順）
    filtered.sort((a, b) => (b.id || 0) - (a.id || 0));
    shownCount = 0;
    globalCardIdx = 0;
    document.getElementById('bento').innerHTML = '';
    renderMore();
}

// ===== 描画 =====
function renderMore() {
    const bento = document.getElementById('bento');
    const empty = document.getElementById('empty');
    const wrap  = document.getElementById('loadMoreWrap');

    if (filtered.length === 0) { empty.style.display='block'; wrap.style.display='none'; return; }
    empty.style.display = 'none';

    const slice = filtered.slice(shownCount, shownCount + PER_PAGE);
    slice.forEach(m => {
        bento.appendChild(createCard(m, globalCardIdx));
        globalCardIdx++;
    });
    shownCount += slice.length;
    document.getElementById('resultInfo').textContent = `${filtered.length} 件`;

    if (shownCount < filtered.length) {
        wrap.style.display = 'block';
        document.getElementById('loadMoreInfo').textContent = `残り ${filtered.length - shownCount} 件`;
    } else {
        wrap.style.display = 'none';
    }
}

document.getElementById('loadMoreBtn').addEventListener('click', renderMore);

// ===== カード生成 =====
function createCard(m, idx) {
    const imgPath  = `assets/materials/${m.largeCategory}/${m.filename}`;
    const catLabel = getCatLabel(m.largeCategory, m.category);
    const sizeClass = getSizeClass(idx);

    const a = document.createElement('a');
    a.className = `bento-item size-${sizeClass}`;
    a.href = `download.html?id=${m.id}`;

    const img = document.createElement('img');
    img.src     = imgPath;
    img.alt     = m.title || m.filename;
    img.loading = 'lazy';
    img.onerror = function() {
        this.parentElement.style.background = '#c9d0d8';
        this.remove();
    };

    const overlay = document.createElement('div');
    overlay.className = 'item-overlay';
    overlay.innerHTML = `
        <div class="overlay-icon">🔍</div>
        <div class="overlay-title">${esc(m.title || m.filename)}</div>
        <div class="overlay-cats">${esc(catLabel)}</div>
    `;

    a.appendChild(img);
    a.appendChild(overlay);
    return a;
}

// ===== 検索 =====
document.getElementById('searchInput').addEventListener('input', e => {
    activeFilters.search = e.target.value.trim();
    applyFilters();
});

// ===== ヘルパー =====
function getCatLabel(large, sub) {
    const l = catDefs[large]; if (!l) return large||'';
    const s = l.subcategories?.[sub] || sub;
    return sub ? `${l.label} › ${s}` : l.label;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== sessionStorage からフィルタ引き継ぎ =====
function applyStoredFilter() {
    // URLパラメータからタグを読み取る（download.htmlのタグリンク対応）
    const params = new URLSearchParams(window.location.search);
    const tagParam = params.get('tag');
    if (tagParam) {
        // タグを選択状態にする
        activeFilters.tags = [tagParam];
        applyFilters();
        // タグ行を表示（大分類未選択でも表示）
        refreshTagRowForced(tagParam);
        return;
    }

    // sessionStorageから大分類フィルタを読み取る（トップページのカテゴリリンク対応）
    const large = sessionStorage.getItem('gallery_filter_large');
    if (!large) return;
    sessionStorage.removeItem('gallery_filter_large');
    setTimeout(() => {
        const btn = document.querySelector(`#rowLarge [data-large="${large}"]`);
        if (btn) selectLarge(large);
    }, 100);
}

// タグ指定時にタグ行を強制表示
function refreshTagRowForced(selectedTag) {
    const row = document.getElementById('rowTag');
    row.innerHTML = '';
    row.style.display = 'flex';
    row.classList.add('has-items');

    const tagSet = new Set();
    allMaterials.forEach(m => (m.tags||[]).forEach(t => tagSet.add(t)));

    const allTags = Array.from(tagSet).sort();
    const LIMIT = 12;
    const visibleTags = allTags.length <= LIMIT ? allTags : allTags.slice(0, LIMIT);

    const dummy = document.createElement('span');
    dummy.className = 'tag-more-btn';
    dummy.style.display = 'none';
    row.appendChild(dummy);

    visibleTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'pill tag-pill' + (tag === selectedTag ? ' active' : '');
        btn.textContent = tag;
        btn.addEventListener('click', () => {
            if (activeFilters.tags.includes(tag)) activeFilters.tags = activeFilters.tags.filter(t => t !== tag);
            else activeFilters.tags.push(tag);
            btn.classList.toggle('active', activeFilters.tags.includes(tag));
            applyFilters();
        });
        row.insertBefore(btn, dummy);
    });

    if (allTags.length > LIMIT) {
        const remaining = allTags.length - LIMIT;
        const moreBtn = document.createElement('button');
        moreBtn.className = 'pill tag-more-btn';
        moreBtn.textContent = `＋${remaining}件 もっと見る`;
        moreBtn.style.cssText = 'border-style:dashed;';
        moreBtn.addEventListener('click', () => {
            moreBtn.remove();
            allTags.slice(LIMIT).forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'pill tag-pill' + (tag === selectedTag ? ' active' : '');
                btn.textContent = tag;
                btn.addEventListener('click', () => {
                    if (activeFilters.tags.includes(tag)) activeFilters.tags = activeFilters.tags.filter(t => t !== tag);
                    else activeFilters.tags.push(tag);
                    btn.classList.toggle('active', activeFilters.tags.includes(tag));
                    applyFilters();
                });
                row.appendChild(btn);
            });
        });
        row.appendChild(moreBtn);
    }
}

// ===== 起動 =====
loadData();
</script>
